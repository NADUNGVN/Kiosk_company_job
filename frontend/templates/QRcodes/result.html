  <style>
    .custom-container {
      max-width: 1400px;
      /* Đặt chiều rộng tùy chọn, có thể thay đổi giá trị theo ý muốn */
      margin: 0 auto;
      /* Căn giữa container */
    }

  
    .col-md-12,
    .col-lg-12 {
  
      justify-content: center;
      align-items: center;
      height: auto;
    }
  
    .box_1 {
      background-size: cover;
      border: 5px solid #000000;
      height: 200px;
      position: relative;
      width: 100%;
      /* Thay đổi kích thước theo nhu cầu của bạn */
      max-width: 1400px;
      /* Giới hạn kích thước tối đa */
      margin: 0 auto;
      /* Canh giữa theo chiều ngang */
    }
  
    .title {
      margin: 20px;
      /* Giảm khoảng cách */
    }
  
    .inner-frame {
      position: absolute;
      right: 8%;
      left: 30%;
      top: -660;
      /* Đẩy lên trên cùng của box_1 */
      border: 2px solid #000000;
      border-top-style: hidden;
      border-left-style: hidden;
      height: 664%;
      pointer-events: none;
    }
  
  
    .inner-frame::before {
      content: "";
      position: absolute;
      right: -12px;
      /* Width of the right edge and arrow */
      width: 22px;
      /* Set the total width of the right edge and arrow */
      height: 22px;
      /* Set the height of the arrow */
      margin-top: -11px;
      /* Half of the arrow's height to center it */
      background-color: #000000;
      /* Color of the right edge and arrow */
      clip-path: polygon(100% 0, 100% 100%, 0 50%);
      /* Define the arrow shape */
      transform: translateY(-50%) rotate(90deg);
      pointer-events: none;/
    }
  
    .service-description {
      text-align: center;
      font-size: 24px;
      color: #333;
      margin: -5px !important;
    }
    #startButton {
      background-color: #4CAF50; /* Green background */
      border: none; /* Remove borders */
      color: white; /* White text */
      padding: 15px 32px; /* Some padding */
      text-align: center; /* Centered text */
      text-decoration: none; /* Remove underline */
      display: inline-block; /* Make the button inline-block */
      font-size: 32px; /* Increase font size */
      margin: 30px 2px; /* Add some margin */
      cursor: pointer; /* Pointer/hand icon */
      border-radius: 12px; /* Rounded corners */
      transition-duration: 0.4s; /* Transition effect */
  }
  
  #startButton:hover {
      background-color: white; /* White background */
      color: black; /* Black text */
      border: 2px solid #4CAF50; /* Green border */
  }
  
  #conversation {
      margin-top: 20px;
  }
  
  .bot-message, .user-message {
      margin: -40px 0;
      padding: 10px;
      border-radius: 10px;
  }
  
  .bot-message {
      background-color: #f1f1f1;
      text-align: left;
  }
  
  .user-message {
      background-color: #d1e7dd;
      text-align: right;
  }
  
  input[type="text"] {
    display: none;
      padding: 10px;
      width: 70%;
      margin: 5px 0;
      box-sizing: border-box;
      border: 2px solid #ccc;
      border-radius: 4px;
  }
  
  button {
      background-color: #4CAF50;
      border: none;
      color: white;
      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 12px;
      margin: 4px 2px;
      cursor: pointer;
      border-radius: 8px;
      transition-duration: 0.4s;
  }
  
  button:hover {
      background-color: white;
      color: black;
      border: 2px solid #4CAF50;
  }
  </style>
