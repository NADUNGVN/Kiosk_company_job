<style>
    .counter-container {
        margin: 100px 20px 20px 20px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        background-color: #f9f9f9;
    }

    .counter-container h2 {
        color: #333;
        font-size: 24px;
        margin-bottom: 15px;
    }

    .list-group {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .list-group-item {
        display: block;
        padding: 10px 15px;
        margin-bottom: 5px;
        background-color: #fff;
        border: 1px solid #ddd;
        border-radius: 5px;
        text-decoration: none;
        color: #333;
        transition: background-color 0.3s, color 0.3s;
    }

    .list-group-item:hover {
        background-color: #007bff;
        color: #fff;
    }
</style>
<body>
    <div class="counter-container">
        <h2>Chọn quầy</h2>
        <div class="list-group">
            {% for counter in counters %}
                <a href="{% url 'voice_chatbot:keyword_check' counter.id %}" class="list-group-item list-group-item-action">
                    Quầy {{ counter.name }}
                </a>
            {% endfor %}
        </div>
    </div>
</body>
